<!DOCTYPE html>
<html>
<head>

    <title>BSNL AI Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            margin:0;
            padding:0;
        }

        .header{
            background:#0077cc;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            width:90%;
            margin:auto;
            padding:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
            margin-bottom:20px;
        }

        input{
            width:95%;
            padding:10px;
            margin:10px 0;
        }

        button{
            background:#0077cc;
            color:white;
            border:none;
            padding:12px 20px;
            cursor:pointer;
            border-radius:5px;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            color:green;
        }

        canvas{
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="header">
    <h1>BSNL AI Network Dashboard 🚀</h1>
</div>

<div class="container">

    <div class="card">

        <h2>AI Fault Prediction</h2>

        <input type="number" id="signal" placeholder="Signal Strength">
        <input type="number" id="temperature" placeholder="Temperature">

<input type="number" id="traffic" placeholder="Traffic Load">

<input type="number" id="power" placeholder="Power Status (1=ON,0=OFF)">

<input type="number" id="health" placeholder="Equipment Health">

<input type="number" id="humidity" placeholder="Humidity">

        <input type="number" step="0.1" id="fiber" placeholder="Fiber Loss">

        <button onclick="predictFault()">Predict</button>

        <div id="result"></div>

    </div>

    <div class="card">

        <h2>Network Analytics</h2>

        <canvas id="myChart"></canvas>

    </div>

</div>

<script>

async function predictFault(){

    let signal = document.getElementById("signal").value;
    let fiber = document.getElementById("fiber").value;

    let response = await fetch('/predict', {

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({
            signal_strength:signal,
            fiber_loss:fiber
        })

    });

    let data = await response.json();

    document.getElementById("result").innerHTML = `

<b>Prediction:</b> ${data.prediction}<br><br>

<b>Fault Probability:</b> ${data.fault_probability}<br><br>

<b>Severity:</b> ${data.severity}

`;
}

const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
        datasets: [{
            label: 'Network Faults',
            data: [12, 19, 8, 15, 10]
        }]
    }
});

</script>

</body>
</html>
