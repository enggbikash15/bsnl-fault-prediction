<!DOCTYPE html>
<html>
<head>
    <title>BSNL AI Fault Prediction</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            text-align:center;
            padding-top:50px;
        }

        .container{
            width:400px;
            background:white;
            padding:30px;
            margin:auto;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            color:#0077cc;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
            border:1px solid gray;
            border-radius:5px;
        }

        button{
            background:#0077cc;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#005fa3;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            color:green;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>BSNL AI Fault Prediction 🚀</h1>

    <input type="number" id="signal" placeholder="Signal Strength">

    <input type="number" step="0.1" id="fiber" placeholder="Fiber Loss">

    <button onclick="predictFault()">Predict</button>

    <div id="result"></div>

</div>

<script>

async function predictFault(){

    let signal = document.getElementById("signal").value;
    let fiber = document.getElementById("fiber").value;

    let response = await fetch('/predict', {

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({
            signal_strength:signal,
            fiber_loss:fiber
        })

    });

    let data = await response.json();

    document.getElementById("result").innerHTML =
        "Prediction: " + data.prediction;
}

</script>

</body>
</html>
