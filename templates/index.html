<!DOCTYPE html>
<html>

<head>

    <title>BSNL AI Network Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#eef2f7;
            margin:0;
            padding:0;
        }

        .header{
            background:linear-gradient(90deg,#0077cc,#00aaff);
            color:white;
            text-align:center;
            padding:20px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.2);
        }

        .header img{
            width:70px;
            vertical-align:middle;
        }

        .header h1{
            display:inline-block;
            margin-left:10px;
            vertical-align:middle;
        }

        .container{
            width:90%;
            max-width:1100px;
            margin:auto;
            margin-top:20px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0px 0px 12px rgba(0,0,0,0.1);
            margin-bottom:25px;
        }

        h2{
            color:#0077cc;
        }

        .input-group{
            margin-bottom:15px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-bottom:5px;
        }

        input{
            width:100%;
            padding:12px;
            border-radius:6px;
            border:1px solid #ccc;
            font-size:15px;
        }

        button{
            background:#0077cc;
            color:white;
            border:none;
            padding:14px 24px;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#005fa3;
        }

        #loading{
            display:none;
            margin-top:15px;
            color:#0077cc;
            font-weight:bold;
        }

        #result{
            margin-top:20px;
            padding:15px;
            border-radius:8px;
            background:#f0f8ff;
            font-size:18px;
            line-height:1.8;
        }

        .footer{
            text-align:center;
            padding:15px;
            color:#555;
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="header">

    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/1/10/BSNL_logo.svg/1200px-BSNL_logo.svg.png">

    <h1>BSNL AI Network Dashboard 🚀</h1>

</div>

<div class="container">

    <div class="card">

        <h2>AI Fault Prediction</h2>

        <div class="input-group">
            <label>Signal Strength</label>
            <input type="number" id="signal" placeholder="Enter signal strength">
        </div>

        <div class="input-group">
            <label>Fiber Loss</label>
            <input type="number" id="fiber" placeholder="Enter fiber loss">
        </div>

        <div class="input-group">
            <label>Temperature</label>
            <input type="number" id="temperature" placeholder="Enter temperature">
        </div>

        <div class="input-group">
            <label>Traffic Load</label>
            <input type="number" id="traffic" placeholder="Enter traffic load">
        </div>

        <div class="input-group">
            <label>Power Status</label>
            <input type="number" id="power" placeholder="1 = ON , 0 = OFF">
        </div>

        <div class="input-group">
            <label>Equipment Health</label>
            <input type="number" id="health" placeholder="Enter equipment health">
        </div>

        <div class="input-group">
            <label>Humidity</label>
            <input type="number" id="humidity" placeholder="Enter humidity">
        </div>

        <button onclick="predictFault()">Predict Fault</button>

        <div id="loading">
            ⏳ AI Model Processing...
        </div>

        <div id="result"></div>

    </div>

    <div class="card">

        <h2>Network Analytics</h2>

        <canvas id="myChart"></canvas>

    </div>

</div>

<div class="footer">
    BSNL AI Telecom Monitoring System © 2026
</div>

<script>

async function predictFault(){

    document.getElementById("loading").style.display = "block";

    let response = await fetch('/predict', {

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({

            signal_strength: document.getElementById("signal").value,

            fiber_loss: document.getElementById("fiber").value,

            temperature: document.getElementById("temperature").value,

            traffic_load: document.getElementById("traffic").value,

            power_status: document.getElementById("power").value,

            equipment_health: document.getElementById("health").value,

            humidity: document.getElementById("humidity").value

        })

    });

    let data = await response.json();

    document.getElementById("loading").style.display = "none";

    document.getElementById("result").innerHTML = `

        <b>Prediction:</b> ${data.prediction}<br>

        <b>Fault Probability:</b> ${data.fault_probability}<br>

        <b>Severity:</b> ${data.severity}

    `;
}

const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
        datasets: [{
            label: 'Network Faults',
            data: [12, 19, 8, 15, 10, 7],
            borderWidth: 3
        }]
    },
    options: {
        responsive:true
    }
});

</script>

</body>
</html>
